{% extends "base.html" %}{% block title %}Sign In{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-top"><span></span><h2>Welcome back</h2><p>Sign in to your SmartJournal</p></div>
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="POST" class="aform">
      <div class="fg"><label>Username</label><input type="text" name="username" placeholder="your_username" required></div>
      <div class="fg"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
      <button class="btn btn-primary btn-full" type="submit">Sign In</button>
    </form>
    <p class="aswitch">No account? <a href="{{ url_for('register') }}">Create one</a></p>
  </div>
</div>
{% endblock %}
